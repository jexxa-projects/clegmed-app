name: Maintain Unreleased Changes

on:
  push:
    branches:
      - main
  workflow_call:

jobs:
  unreleased_changes:
    name: Maintain Unreleased Changes
    runs-on: ubuntu-latest

    # Prevents merge conflicts
    concurrency: unreleased_changes

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4 # Hinweis: v4 ist aktuell die stabile Version
        with:
          fetch-depth: 0

      - name: Pull latest changes
        env:
          USERNAME: 'Pull_Action_User'
          # Escaping für den GITHUB_TOKEN
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git pull origin main -r -X theirs

      - name: Create log file with unreleased changes
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          # Pfad bleibt statisch, da er innerhalb des Templates fix ist
          config: .github/workflows/config/cliff.toml
          args: -v --unreleased --strip header
        env:
          OUTPUT: UNRELEASED_CHANGES.md

      # Der gesamte Commit-Schritt wird zum Schutz vor Jinja-Fehlern eingekapselt
      
      - name: Commit UNRELEASED_CHANGES.md
        uses: stefanzweifel/git-auto-commit-action@v5 # v5 ist die aktuelle Major
        with:
          branch: main
          commit_message: 'chore(doc): maintain UNRELEASED_CHANGES.md'
          file_pattern: UNRELEASED_CHANGES.md
      
