name: CMake 4 Linux CI (C++23)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    name: Build & Test (Ubuntu / GCC 14)
    runs-on: ubuntu-latest

    steps:
      # 1. Quellcode auschecken
      - name: Checkout Code
        uses: actions/checkout@v5

      # 2. Abhängigkeiten (Doxygen) installieren
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      # 3. Garantiert CMake 4 installieren
      - name: Setup CMake 4
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.x'

      # 4. Build-Verzeichnis vorbereiten
      - name: Set Build Directory
        id: strings
        shell: bash
        run: echo "build-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      # 5. CMake konfigurieren (GCC 14 wird explizit als C++23 Compiler gesetzt)
      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-dir }}
          -DCMAKE_CXX_COMPILER=g++-14
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_STANDARD=23
          -DCMAKE_CXX_STANDARD_REQUIRED=ON
          -S ${{ github.workspace }}

      # 6. Projekt kompilieren
      - name: Build Project
        run: cmake --build ${{ steps.strings.outputs.build-dir }} --config Release

      # 7. Tests ausführen
      - name: Run Tests
        working-directory: ${{ steps.strings.outputs.build-dir }}
        run: ctest --build-config Release
